# Markov reverse-proxy snippet — drop this INSIDE the existing
# `server { ... }` block for stockotter.ai. Because it lives under the
# same origin as the frontend, the browser sees /markov-api as
# same-origin and CORS never kicks in.
#
# Install:
#   sudo nano /etc/nginx/sites-available/stockotter.ai
#   (paste the location block below somewhere inside the server { } )
#   sudo nginx -t        # test config
#   sudo systemctl reload nginx

location /markov-api/ {
    proxy_pass http://127.0.0.1:8001/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Backtests can be slow on long histories; give it room.
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
}
